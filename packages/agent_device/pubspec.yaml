name: agent_device
description: >-
  Agent-driven CLI and library for mobile UI automation, network inspection,
  and performance diagnostics across iOS, Android, tvOS, macOS, and Linux.
  Dart port of the TypeScript agent-device project.
version: 0.0.1
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.0

executables:
  agent-device: agent_device
  ad: agent_device

dependencies:
  args: ^2.5.0
  path: ^1.9.0
  crypto: ^3.0.5
  http: ^1.2.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  xml: ^6.5.0
  image: ^4.3.0
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
