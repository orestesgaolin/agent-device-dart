name: agent_device
description: >-
  Agent-driven CLI and library for mobile UI automation, network inspection,
  and performance diagnostics across iOS, Android, tvOS, macOS, and Linux.
  Dart port of the TypeScript agent-device project.
version: 0.0.1
publish_to: none
homepage: https://github.com/roszkowski/agent-device-dart
repository: https://github.com/roszkowski/agent-device-dart
issue_tracker: https://github.com/roszkowski/agent-device-dart/issues

resolution: workspace

environment:
  sdk: ^3.10.0

executables:
  agent-device: agent_device
  ad: agent_device

dependencies:
  args: ^2.7.0
  path: ^1.9.1
  crypto: ^3.0.7
  http: ^1.6.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  xml: ^6.6.1
  image: ^4.8.0
  meta: ^1.18.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
