name: agent_device
description: >-
  Agent-enabled CLI and library for mobile UI automation, network inspection,
  and performance diagnostics across iOS and Android.
  Dart port of the TypeScript agent-device project.
version: 0.0.4
homepage: https://github.com/orestesgaolin/agent-device-dart/
repository: https://github.com/orestesgaolin/agent-device-dart
issue_tracker: https://github.com/orestesgaolin/agent-device-dart/issues

resolution: workspace

environment:
  sdk: ^3.10.0

executables:
  agent-device: agent_device
  ad: agent_device

dependencies:
  args: ^2.7.0
  cli_util: ^0.5.0
  path: ^1.9.1
  crypto: ^3.0.7
  http: ^1.6.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  xml: ^6.6.1
  image: ^4.8.0
  meta: ^1.18.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
