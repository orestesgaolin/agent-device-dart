name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub get

      - name: Get Flutter fixture dependencies
        run: flutter pub get
        working-directory: test_apps/agent_device_fixture_app

      - run: dart analyze
      - run: dart test packages/agent_device
