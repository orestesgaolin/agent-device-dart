name: Fixture Live

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-fixture-live:
    name: Android Fixture Live
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGENT_DEVICE_STATE_DIR: ${{ github.workspace }}/.tmp/agent-device-android
      FIXTURE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/fixture-live-android
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Get Dart dependencies
        run: dart pub get

      - name: Get Flutter fixture dependencies
        run: flutter pub get
        working-directory: test_apps/agent_device_fixture_app

      - name: Ensure ffmpeg
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build, install, and test on Android emulator
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        with:
          api-level: 36
          arch: x86_64
          profile: pixel_7
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: bash .github/scripts/run-fixture-android-live.sh

      - name: Upload Android fixture artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-fixture-live-artifacts
          if-no-files-found: ignore
          path: |
            ${{ env.AGENT_DEVICE_STATE_DIR }}/**
            ${{ env.FIXTURE_ARTIFACT_DIR }}/**

  ios-fixture-live:
    name: iOS Fixture Live
    runs-on: macos-26
    timeout-minutes: 80
    env:
      AGENT_DEVICE_STATE_DIR: ${{ github.workspace }}/.tmp/agent-device-ios
      FIXTURE_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/fixture-live-ios
      IOS_RUNTIME_VERSION: "26.2"
      IOS_SIMULATOR_NAME: "iPhone 17 Pro"
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Dart dependencies
        run: dart pub get

      - name: Get Flutter fixture dependencies
        run: flutter pub get
        working-directory: test_apps/agent_device_fixture_app

      - name: Ensure ffmpeg
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            brew install ffmpeg
          fi

      - name: Resolve and boot simulator
        id: boot-sim
        run: |
          set -euo pipefail
          export IOS_RUNTIME_VERSION IOS_SIMULATOR_NAME
          UDID="$(xcrun simctl list devices available -j | python3 -c "import json, os, sys; payload=json.load(sys.stdin); token='iOS-' + os.environ['IOS_RUNTIME_VERSION'].replace('.', '-'); preferred=os.environ['IOS_SIMULATOR_NAME']; selected=next((device['udid'] for runtime, devices in payload.get('devices', {}).items() if token in runtime for device in devices if device.get('isAvailable') and device.get('name') == preferred), ''); sys.stdout.write(selected) if selected else sys.exit('No matching simulator available')")"
          xcrun simctl shutdown all || true
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build iOS runner
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project ios-runner/AgentDeviceRunner/AgentDeviceRunner.xcodeproj \
            -scheme AgentDeviceRunner \
            -destination "platform=iOS Simulator,id=${{ steps.boot-sim.outputs.udid }}" \
            -derivedDataPath ios-runner/build

      - name: Build and install Flutter fixture app
        run: |
          set -euo pipefail
          pushd test_apps/agent_device_fixture_app
          flutter build ios --debug --simulator
          popd
          xcrun simctl install "${{ steps.boot-sim.outputs.udid }}" \
            test_apps/agent_device_fixture_app/build/ios/iphonesimulator/Runner.app

      - name: CLI smoke on fixture app
        env:
          FIXTURE_IOS_UDID: ${{ steps.boot-sim.outputs.udid }}
        run: bash .github/scripts/run-fixture-ios-live.sh

      - name: Upload iOS fixture artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-fixture-live-artifacts
          if-no-files-found: ignore
          path: |
            ${{ env.AGENT_DEVICE_STATE_DIR }}/**
            ${{ env.FIXTURE_ARTIFACT_DIR }}/**
            ios-runner/build/Logs/**
